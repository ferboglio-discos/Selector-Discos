<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Selector de Discos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
      --text: #1a1a1a; --text2: #666660; --text3: #999994;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 8px; --radius-lg: 12px;
      --purple-bg: #eeedfe; --purple: #3c3489;
      --teal-bg: #e1f5ee; --teal: #0f6e56;
      --amber-bg: #faeeda; --amber: #633806;
      --blue-bg: #e6f1fb; --blue: #0c447c;
      --green-bg: #eaf3de; --green: #3b6d11;
      --red-bg: #fcebeb; --red: #a32d2d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
        --text: #f0efe8; --text2: #aaa99f; --text3: #666660;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 1rem; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
    .logo { width: 40px; height: 40px; border-radius: 50%; background: #2c2c2a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 22px; height: 22px; }
    .header h1 { font-size: 18px; font-weight: 500; }
    .header p { font-size: 13px; color: var(--text2); }
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--bg2); border-radius: var(--radius); padding: 4px; }
    .tab { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; border: none; background: transparent; color: var(--text2); cursor: pointer; border-radius: 6px; transition: all 0.15s; }
    .tab.active { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
    .card-title { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; }
    select, input[type="text"], textarea { width: 100%; padding: 8px 10px; font-size: 14px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; }
    textarea { resize: vertical; min-height: 60px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mood-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .mood-btn { padding: 10px 8px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; text-align: center; line-height: 1.4; transition: all 0.15s; }
    .mood-btn.selected { background: var(--purple-bg); border-color: #7f77dd; color: var(--purple); }
    .mood-icon { font-size: 18px; display: block; margin-bottom: 2px; }
    .clima-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .clima-btn { padding: 10px 6px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 12px; cursor: pointer; text-align: center; line-height: 1.4; transition: all 0.15s; }
    .clima-btn.selected { background: var(--teal-bg); border-color: #1d9e75; color: var(--teal); }
    .clima-icon { font-size: 20px; display: block; margin-bottom: 3px; }
    .temp-row { display: flex; align-items: center; gap: 12px; margin-top: 12px; }
    .temp-row label { margin: 0; white-space: nowrap; }
    .temp-display { font-size: 20px; font-weight: 500; min-width: 55px; }
    input[type="range"] { flex: 1; accent-color: #2c2c2a; }
    .rec-btn { width: 100%; padding: 14px; background: #2c2c2a; color: #f1efe8; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 4px; transition: background 0.15s; }
    .rec-btn:hover { background: #444441; }
    .rec-btn:disabled { opacity: 0.5; cursor: default; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-purple { background: var(--purple-bg); color: var(--purple); }
    .badge-teal { background: var(--teal-bg); color: var(--teal); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-blue { background: var(--blue-bg); color: var(--blue); }
    .badge-coral { background: #faece7; color: #712b13; }
    .context-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .result-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.25rem 1.25rem 1.5rem; margin-bottom: 12px; }
    .result-rank { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .result-album { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
    .result-artist { font-size: 14px; color: var(--text2); margin-bottom: 10px; }
    .result-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .result-body { font-size: 13px; color: var(--text2); line-height: 1.6; padding-top: 10px; border-top: 0.5px solid var(--border); }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--text2); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; line-height: 1.7; }
    .library-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .library-row:last-child { border-bottom: none; }
    .disc-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--bg2); border: 0.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
    .disc-info { flex: 1; min-width: 0; }
    .disc-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .disc-sub { font-size: 12px; color: var(--text2); }
    .disc-type { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); flex-shrink: 0; }
    .del-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 4px; opacity: 0.5; }
    .del-btn:hover { opacity: 1; color: #d85a30; }
    .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .add-form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
    .add-btn { padding: 8px 16px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; cursor: pointer; color: var(--text); white-space: nowrap; }
    .add-btn:hover { background: var(--bg3); }
    .import-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; cursor: pointer; background: var(--bg2); position: relative; transition: all 0.15s; }
    .import-zone:hover { border-color: #7f77dd; }
    .import-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .import-result { margin-top: 12px; padding: 10px 14px; border-radius: var(--radius); font-size: 13px; }
    .import-result.success { background: var(--green-bg); color: var(--green); }
    .import-result.error { background: var(--red-bg); color: var(--red); }
    .import-result.warning { background: var(--amber-bg); color: var(--amber); }
    .lib-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
    .lib-search { flex: 1; padding: 6px 10px; font-size: 13px; border: 0.5px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-family: inherit; }
    .clear-btn { padding: 6px 12px; background: none; border: 0.5px solid #f09595; color: var(--red); border-radius: var(--radius); font-size: 12px; cursor: pointer; }
    .clear-btn:hover { background: var(--red-bg); }
    .pager { display: flex; align-items: center; gap: 8px; margin-top: 12px; justify-content: center; }
    .pager button { padding: 4px 12px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 12px; cursor: pointer; color: var(--text); }
    .pager button:disabled { opacity: 0.4; cursor: default; }
    .pager span { font-size: 12px; color: var(--text2); }
    .streaming-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-top: 16px; font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; min-height: 60px; }
    .streaming-box strong { font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#F1EFE8" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="4" stroke="#F1EFE8" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="1.5" fill="#F1EFE8"/>
      </svg>
    </div>
    <div>
      <h1>Selector de Discos</h1>
      <p>Vinilos &amp; CDs · Recomendación inteligente</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('recomendar')">Recomendar</button>
    <button class="tab" onclick="showTab('biblioteca')">Biblioteca</button>
  </div>

  <div class="section active" id="sec-recomendar">
    <div class="card">
      <div class="card-title">Estado de ánimo</div>
      <div class="mood-grid">
        <button class="mood-btn" onclick="selectMood(this,'Alegre')"><span class="mood-icon">☀️</span>Alegre</button>
        <button class="mood-btn" onclick="selectMood(this,'Melancólico')"><span class="mood-icon">🌧️</span>Melancólico</button>
        <button class="mood-btn" onclick="selectMood(this,'Romántico')"><span class="mood-icon">🌹</span>Romántico</button>
        <button class="mood-btn" onclick="selectMood(this,'Enérgico')"><span class="mood-icon">⚡</span>Enérgico</button>
        <button class="mood-btn" onclick="selectMood(this,'Tranquilo')"><span class="mood-icon">🍃</span>Tranquilo</button>
        <button class="mood-btn" onclick="selectMood(this,'Introspectivo')"><span class="mood-icon">🌙</span>Introspectivo</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Clima ahora</div>
      <div class="clima-grid">
        <button class="clima-btn" onclick="selectClima(this,'Despejado','☀️')"><span class="clima-icon">☀️</span>Despejado</button>
        <button class="clima-btn" onclick="selectClima(this,'Nublado','⛅')"><span class="clima-icon">⛅</span>Nublado</button>
        <button class="clima-btn" onclick="selectClima(this,'Lluvia','🌧️')"><span class="clima-icon">🌧️</span>Lluvia</button>
        <button class="clima-btn" onclick="selectClima(this,'Tormenta','⛈️')"><span class="clima-icon">⛈️</span>Tormenta</button>
        <button class="clima-btn" onclick="selectClima(this,'Frío','🧊')"><span class="clima-icon">🧊</span>Frío</button>
        <button class="clima-btn" onclick="selectClima(this,'Calor','🌡️')"><span class="clima-icon">🌡️</span>Calor</button>
        <button class="clima-btn" onclick="selectClima(this,'Viento','💨')"><span class="clima-icon">💨</span>Viento</button>
        <button class="clima-btn" onclick="selectClima(this,'Niebla','🌫️')"><span class="clima-icon">🌫️</span>Niebla</button>
      </div>
      <div class="temp-row">
        <label>Temperatura</label>
        <input type="range" id="temp-slider" min="-5" max="45" value="20" step="1"
          oninput="state.temp=parseInt(this.value);document.getElementById('temp-val').textContent=this.value+'°C';updateContexto()"/>
        <span class="temp-display" id="temp-val">20°C</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Más parámetros</div>
      <div class="grid-2">
        <div><label>Ocasión</label>
          <select id="ocasion">
            <option value="">Sin especificar</option>
            <option>Solo en casa</option><option>Con amigos</option>
            <option>Cena romántica</option><option>Trabajo o estudio</option>
            <option>Fiesta</option><option>Meditación</option>
          </select>
        </div>
        <div><label>Duración</label>
          <select id="duracion">
            <option value="">Sin preferencia</option>
            <option>30 minutos</option><option>1 hora</option><option>2 horas o más</option>
          </select>
        </div>
      </div>
      <div style="margin-top:10px">
        <label>Nota adicional (opcional)</label>
        <textarea id="nota-extra" placeholder="Ej: algo tranquilo para la sobremesa..."></textarea>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Contexto detectado</div>
      <div id="contexto-display"><span style="font-size:13px;color:var(--text2)">Completá los campos arriba.</span></div>
    </div>
    <button class="rec-btn" id="btn-rec" onclick="recomendar()">Recomendar discos</button>
    <div id="resultado"></div>
  </div>

  <div class="section" id="sec-biblioteca">
    <div class="card">
      <div class="card-title">Importar desde Excel</div>
      <div class="import-zone" id="import-zone">
        <input type="file" id="xlsx-input" accept=".xlsx,.xls" onchange="importarExcel(this)"/>
        <span style="font-size:28px;display:block;margin-bottom:8px">📊</span>
        <div style="font-size:14px;font-weight:500;margin-bottom:4px">Arrastrá tu Excel o tocá aquí</div>
        <div style="font-size:12px;color:var(--text2)">Formato .xlsx</div>
      </div>
      <div id="import-result"></div>
    </div>
    <div class="card">
      <div class="card-title">Agregar manualmente</div>
      <div class="add-form">
        <div><label>Álbum</label><input type="text" id="new-album" placeholder="Título"/></div>
        <div><label>Artista</label><input type="text" id="new-artist" placeholder="Artista"/></div>
        <div><label>Género</label>
          <select id="new-genre">
            <option>Rock</option><option>Jazz</option><option>Clásica</option><option>Pop</option>
            <option>Blues</option><option>Folk</option><option>Electrónica</option>
            <option>Tango</option><option>Folklore</option><option>Otro</option>
          </select>
        </div>
        <div><label>Tipo</label>
          <select id="new-type"><option value="vinyl">Vinilo</option><option value="cd">CD</option></select>
        </div>
      </div>
      <div class="add-form-row">
        <div><label>Año</label><input type="text" id="new-year" placeholder="Opcional"/></div>
        <div></div>
        <button class="add-btn" onclick="agregarDisco()">+ Agregar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Mi biblioteca <span id="lib-count" style="font-weight:400;color:var(--text2)"></span></div>
      <div class="lib-toolbar">
        <input class="lib-search" type="text" id="lib-filter" placeholder="Filtrar..." oninput="renderLibrary()"/>
        <button class="clear-btn" onclick="limpiarBiblioteca()">Vaciar</button>
      </div>
      <div id="library-list"></div>
      <div class="pager" id="pager"></div>
    </div>
  </div>
</div>

<script>
const PAGE_SIZE = 15;
let currentPage = 0;
let state = {
  library: JSON.parse(localStorage.getItem('vinyl_library') || '[]'),
  mood: null, clima: null, climaEmoji: null, temp: 20
};
function saveLibrary() { try { localStorage.setItem('vinyl_library', JSON.stringify(state.library)); } catch(e){} }
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector('[onclick="showTab(\''+tab+'\')"]').classList.add('active');
  document.getElementById('sec-' + tab).classList.add('active');
}
function selectMood(btn, mood) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected'); state.mood = mood; updateContexto();
}
function selectClima(btn, clima, emoji) {
  document.querySelectorAll('.clima-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected'); state.clima = clima; state.climaEmoji = emoji; updateContexto();
}
function getSeason() {
  const m = new Date().getMonth()+1;
  if([12,1,2].includes(m)) return {name:'Verano',emoji:'☀️'};
  if([3,4,5].includes(m)) return {name:'Otoño',emoji:'🍂'};
  if([6,7,8].includes(m)) return {name:'Invierno',emoji:'❄️'};
  return {name:'Primavera',emoji:'🌸'};
}
function getTimeOfDay() {
  const h = new Date().getHours();
  if(h>=6&&h<12) return {name:'Mañana',emoji:'🌅'};
  if(h>=12&&h<14) return {name:'Mediodía',emoji:'🌞'};
  if(h>=14&&h<19) return {name:'Tarde',emoji:'🌇'};
  if(h>=19&&h<22) return {name:'Noche',emoji:'🌃'};
  return {name:'Madrugada',emoji:'🌙'};
}
function getDayType() { return [0,6].includes(new Date().getDay()) ? 'Fin de semana' : 'Día de semana'; }
function updateContexto() {
  const s = getSeason(), tod = getTimeOfDay();
  const chips = [
    '<span class="badge badge-purple">'+tod.emoji+' '+tod.name+'</span>',
    '<span class="badge badge-teal">'+s.emoji+' '+s.name+'</span>',
    state.clima ? '<span class="badge badge-blue">'+state.climaEmoji+' '+state.clima+' · '+state.temp+'°C</span>' : '',
    '<span class="badge badge-amber">'+getDayType()+'</span>',
    state.mood ? '<span class="badge badge-purple">'+state.mood+'</span>' : '',
  ].filter(Boolean).join('');
  document.getElementById('contexto-display').innerHTML = '<div class="context-chips">'+chips+'</div>';
}
async function recomendar() {
  if (!state.library.length) { alert('Tu biblioteca está vacía.'); showTab('biblioteca'); return; }
  if (!state.mood) { alert('Seleccioná un estado de ánimo.'); return; }
  const btn = document.getElementById('btn-rec');
  const resultDiv = document.getElementById('resultado');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Analizando tu biblioteca...';
  resultDiv.innerHTML = '';
  const s = getSeason(), tod = getTimeOfDay();
  const timeStr = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  const libraryText = state.library.map((d,i) =>
    (i+1)+'. "'+d.album+'" de '+d.artist+(d.year?' ('+d.year+')':'')+(d.genre?', '+d.genre:'')+' ['+(d.type==='vinyl'?'Vinilo':'CD')+']'
  ).join('\n');
  const nota = document.getElementById('nota-extra').value.trim();
  const prompt = 'Sos un sommelier musical experto. El usuario tiene esta biblioteca de discos:\n\n'+libraryText+'\n\nContexto actual:\n- Momento: '+tod.name+' ('+timeStr+'), '+getDayType()+'\n- Época: '+s.name+' (hemisferio sur, Buenos Aires)\n- Clima: '+(state.clima||'No especificado')+' · '+state.temp+'°C\n- Estado de ánimo: '+state.mood+'\n- Ocasión: '+(document.getElementById('ocasion').value||'Sin especificar')+'\n- Duración deseada: '+(document.getElementById('duracion').value||'Sin preferencia')+'\n'+(nota?'- Nota: '+nota:'')+'\n\nRecomendá los 3 discos más apropiados de la biblioteca para este momento exacto. Para cada uno:\n1. Nombre del álbum y artista\n2. Una razón musical y emocional específica de por qué encaja con este contexto (2-3 oraciones)\n3. Una sugerencia concreta de cómo escucharlo\n\nUsá un formato claro con numeración, negrita en el título del disco, y un tono cálido y experto.';
  try {
    const res = await fetch('/api/recomendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const html = data.resultado
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br/>');
    resultDiv.innerHTML = '<div class="streaming-box"><p>'+html+'</p></div>';
  } catch(e) {
    resultDiv.innerHTML = '<div class="streaming-box" style="color:var(--red)">Error: '+e.message+'</div>';
  }
  btn.disabled = false;
  btn.innerHTML = 'Recomendar discos';
}
function renderLibrary() {
  const filter = (document.getElementById('lib-filter')?.value || '').toLowerCase();
  const filtered = state.library.filter(d =>
    !filter || d.album.toLowerCase().includes(filter) ||
    d.artist.toLowerCase().includes(filter) ||
    (d.genre||'').toLowerCase().includes(filter)
  );
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
  if (currentPage >= totalPages) currentPage = totalPages - 1;
  const page = filtered.slice(currentPage * PAGE_SIZE, (currentPage+1) * PAGE_SIZE);
  document.getElementById('lib-count').textContent = '('+state.library.length+' discos)';
  const list = document.getElementById('library-list');
  if (!state.library.length) { list.innerHTML = '<div class="empty-state">No hay discos.<br/>Importá un Excel o agregá manualmente.</div>'; document.getElementById('pager').innerHTML = ''; return; }
  if (!page.length) { list.innerHTML = '<div class="empty-state">Sin resultados.</div>'; document.getElementById('pager').innerHTML = ''; return; }
  list.innerHTML = page.map(d => {
    const i = state.library.indexOf(d);
    return '<div class="library-row"><div class="disc-icon">'+(d.type==='vinyl'?'⚫':'💿')+'</div><div class="disc-info"><div class="disc-title">'+d.album+'</div><div class="disc-sub">'+d.artist+(d.year?' · '+d.year:'')+(d.genre?' · '+d.genre:'')+'</div></div><span class="disc-type">'+(d.type==='vinyl'?'Vinilo':'CD')+'</span><button class="del-btn" onclick="eliminarDisco('+i+')">✕</button></div>';
  }).join('');
  const pager = document.getElementById('pager');
  if (totalPages <= 1) { pager.innerHTML = ''; return; }
  pager.innerHTML = '<button onclick="changePage(-1)" '+(currentPage===0?'disabled':'')+'>← Anterior</button><span>Página '+(currentPage+1)+' de '+totalPages+'</span><button onclick="changePage(1)" '+(currentPage>=totalPages-1?'disabled':'')+'>Siguiente →</button>';
}
function changePage(dir) { currentPage += dir; renderLibrary(); }
function agregarDisco() {
  const album = document.getElementById('new-album').value.trim();
  const artist = document.getElementById('new-artist').value.trim();
  if (!album || !artist) { alert('Completá álbum y artista.'); return; }
  state.library.push({ album, artist, genre: document.getElementById('new-genre').value, type: document.getElementById('new-type').value, year: document.getElementById('new-year').value.trim() });
  saveLibrary(); renderLibrary();
  ['new-album','new-artist','new-year'].forEach(id => document.getElementById(id).value = '');
}
function eliminarDisco(i) { state.library.splice(i, 1); saveLibrary(); renderLibrary(); }
function limpiarBiblioteca() {
  if (!confirm('¿Vaciar toda la biblioteca? ('+state.library.length+' discos)')) return;
  state.library = []; saveLibrary(); renderLibrary();
}
function importarExcel(input) {
  const file = input.files[0]; if (!file) return;
  const resultEl = document.getElementById('import-result');
  resultEl.innerHTML = '<div class="import-result warning">Leyendo archivo...</div>';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      if (!rows.length) { resultEl.innerHTML = '<div class="import-result error">El archivo está vacío.</div>'; return; }
      let added = 0, skipped = 0;
      rows.forEach(row => {
        const album = (row['Album']||row['album']||row['ALBUM']||'').toString().trim();
        const artist = (row['Artista']||row['artista']||row['Artist']||row['artist']||'').toString().trim();
        if (!album || !artist) { skipped++; return; }
        const typeRaw = (row['Tipo']||row['tipo']||'vinyl').toString().trim().toLowerCase();
        if (state.library.some(d => d.album.toLowerCase()===album.toLowerCase() && d.artist.toLowerCase()===artist.toLowerCase())) { skipped++; return; }
        state.library.push({ album, artist, genre: (row['Genero']||row['genero']||row['Género']||'Otro').toString().trim()||'Otro', type: typeRaw==='cd'?'cd':'vinyl', year: (row['Año']||row['año']||row['Year']||'').toString().trim() });
        added++;
      });
      saveLibrary(); renderLibrary();
      resultEl.innerHTML = added > 0 ? '<div class="import-result success">✓ '+added+' discos importados.'+(skipped>0?' '+skipped+' omitidos.':'')+'</div>' : '<div class="import-result warning">Sin discos nuevos. '+skipped+' omitidos.</div>';
    } catch(err) { resultEl.innerHTML = '<div class="import-result error">Error: '+err.message+'</div>'; }
  };
  reader.readAsArrayBuffer(file); input.value = '';
}
const zone = document.getElementById('import-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#7f77dd'; });
zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file) { const dt = new DataTransfer(); dt.items.add(file); document.getElementById('xlsx-input').files = dt.files; importarExcel(document.getElementById('xlsx-input')); }
});
renderLibrary();
updateContexto();
</script>
